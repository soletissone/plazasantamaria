<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Encuesta · Cambio de Plaza · Santa María de Tigre</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-light: #E1F5EE;
    --red: #D85A30; --red-light: #FAECE7;
    --blue: #185FA5;
    --gray-50: #F7F6F2; --gray-100: #EDECE7;
    --gray-300: #B4B2A9; --gray-700: #444441; --gray-900: #1C1C1A;
    --white: #FFFFFF; --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }
  header { background: var(--white); border-bottom: 1px solid var(--gray-100); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: var(--gray-900); line-height: 1.2; }
  .header-left p { font-size: 13px; color: var(--gray-300); margin-top: 4px; }
  .badge-live { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--green); background: var(--green-light); padding: 5px 12px; border-radius: 99px; }
  .badge-live::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .metric-card { background: var(--white); border-radius: var(--radius); padding: 1.5rem; border: 1px solid var(--gray-100); text-align: center; }
  .metric-card .label { font-size: 12px; color: var(--gray-300); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .metric-card .value { font-family: 'DM Serif Display', serif; font-size: 48px; font-weight: 400; line-height: 1; }
  .metric-card .pct { font-size: 14px; margin-top: 6px; }
  .card { background: var(--white); border-radius: var(--radius); padding: 1.5rem; border: 1px solid var(--gray-100); margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--gray-300); margin-bottom: 1.25rem; text-align: center; }
  .legend { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
  .legend span { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray-700); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .comment-item { font-size: 13px; color: var(--gray-700); padding: 10px 0; border-bottom: 1px solid var(--gray-100); line-height: 1.6; }
  .comment-item:last-child { border-bottom: none; }
  .comments-list { max-height: 220px; overflow-y: auto; }
  footer { text-align: center; font-size: 12px; color: var(--gray-300); padding: 2rem; border-top: 1px solid var(--gray-100); margin-top: 1rem; background: var(--white); }
  footer a { color: var(--blue); text-decoration: none; }
  #last-update { font-size: 12px; color: var(--gray-300); margin-top: 4px; }
  .error-box { background: var(--red-light); color: var(--red); border-radius: var(--radius-sm); padding: 1rem; font-size: 13px; margin-bottom: 1rem; display: none; line-height: 1.5; }
  @media (max-width: 500px) { header { padding: 1rem; } main { padding: 1rem; } .metric-card .value { font-size: 36px; } }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Cambio de Plaza · Santa María de Tigre</h1>
    <p>Consulta vecinal — Barrio Santa María, Tigre</p>
  </div>
  <div style="text-align:right;">
    <span class="badge-live">En vivo</span>
    <p id="last-update">Cargando...</p>
  </div>
</header>

<main>
  <div class="error-box" id="error-box"></div>

  <div class="metrics-grid">
    <div class="metric-card">
      <p class="label">Total de votos</p>
      <p class="value" id="m-total" style="color:var(--gray-900)">—</p>
    </div>
    <div class="metric-card">
      <p class="label">A favor</p>
      <p class="value" id="m-favor" style="color:var(--green)">—</p>
      <p class="pct" id="m-favor-pct" style="color:var(--green)"></p>
    </div>
    <div class="metric-card">
      <p class="label">En contra</p>
      <p class="value" id="m-contra" style="color:var(--red)">—</p>
      <p class="pct" id="m-contra-pct" style="color:var(--red)"></p>
    </div>
  </div>

  <div class="card">
    <p class="card-title">Resultado general</p>
    <div class="legend" id="legend-pie"></div>
    <div style="position:relative; height:280px; max-width:280px; margin: 0 auto;">
      <canvas id="pieChart" role="img" aria-label="Gráfico de torta con resultados a favor y en contra"></canvas>
    </div>
  </div>

  <div class="card" id="comments-card" style="display:none;">
    <p class="card-title">Comentarios de vecinos</p>
    <div class="comments-list" id="comments-list"></div>
  </div>
</main>

<footer>
  Se actualiza automáticamente cada 60 segundos ·
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSfNXeeffOH5IliWzP_gPJc7Hgj67t5QKq_snJurzHqv2bshRg/viewform" target="_blank">Completar encuesta</a>
</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTnB4HCt77WKF14eP0XA8q5tSkSOiJz58SkoxUwAlXibTzCskHgXNcebd-2DEAO1t9l4lK6AW8NvKEO/pub?output=csv';
let pieInst = null;

function parseLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseLine(lines[0]);
  return lines.slice(1).map(l => {
    const vals = parseLine(l);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v.length > 0));
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length) {
      renderAll(rows);
      document.getElementById('error-box').style.display = 'none';
    }
    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-AR');
  } catch(e) {
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-box').innerHTML = 'No se pudieron cargar los datos.<br><small>' + e.message + '</small>';
    document.getElementById('last-update').textContent = 'Error al cargar';
  }
}

function renderAll(rows) {
  const headers = Object.keys(rows[0]);
  const votoCol = headers.find(h => /acuerdo|favor|voto|opini[oó]/i.test(h)) || headers[1];
  const comentCol = headers.find(h => /coment|observ/i.test(h));

  const counts = { favor: 0, contra: 0 };
  const comentarios = [];

  rows.forEach(r => {
    const v = (r[votoCol] || '').toLowerCase();
    if (/s[íi]\b|^s[íi]|favor|de acuerdo/.test(v)) counts.favor++;
    else if (/\bno\b|^no$|contra|desacuerdo/.test(v)) counts.contra++;
    if (comentCol && r[comentCol] && r[comentCol].length > 3) comentarios.push(r[comentCol]);
  });

  const total = counts.favor + counts.contra;
  const pct = n => total ? Math.round(n / total * 100) : 0;

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-favor').textContent = counts.favor;
  document.getElementById('m-contra').textContent = counts.contra;
  document.getElementById('m-favor-pct').textContent = pct(counts.favor) + '% del total';
  document.getElementById('m-contra-pct').textContent = pct(counts.contra) + '% del total';

  renderPie(counts, pct);
  renderComentarios(comentarios);
}

function renderPie(counts, pct) {
  const labels = ['A favor', 'En contra'];
  const data = [counts.favor, counts.contra];
  const colors = ['#1D9E75', '#D85A30'];

  document.getElementById('legend-pie').innerHTML = labels.map((l, i) =>
    `<span><span class="legend-dot" style="background:${colors[i]}"></span>${l} · ${pct(data[i])}%</span>`
  ).join('');

  if (pieInst) pieInst.destroy();
  pieInst = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 3, borderColor: '#ffffff', hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} votos (${pct(ctx.raw)}%)` } }
      }
    }
  });
}

function renderComentarios(comentarios) {
  const card = document.getElementById('comments-card');
  if (!comentarios.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('comments-list').innerHTML = comentarios.map(c => `<div class="comment-item">"${c}"</div>`).join('');
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
